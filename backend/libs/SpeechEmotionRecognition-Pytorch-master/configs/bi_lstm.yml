# 数据集参数
dataset_conf:
  dataset:
    min_duration: 0.4
    max_duration: 3
    sample_rate: 16000
    use_dB_normalization: True
    target_dB: -20
    scaler_path: 'dataset/standard.m'

  dataLoader:
    batch_size: 32
    drop_last: True
    num_workers: 4

  train_list: 'dataset/train_list.txt'
  test_list: 'dataset/test_list.txt'
  label_list_path: 'dataset/label_list.txt'

  eval_conf:
    batch_size: 1
    max_duration: 5

preprocess_conf:
  feature_method: 'Emotion2Vec'
  method_args:
    granularity: 'utterance'

model_conf:
  model: 'BiLSTM'
  model_args:
    num_class: null   # 自动读取四分类

optimizer_conf:
  optimizer: 'Adam'
  optimizer_args:
    lr: 0.001
    weight_decay: !!float 1e-5

  scheduler: 'WarmupCosineSchedulerLR'
  scheduler_args:
    min_lr: !!float 1e-5
    max_lr: 0.001
    warmup_epoch: 5

train_conf:
  enable_amp: False
  use_compile: False
  label_smoothing: 0.1
  max_epoch: 100
  log_interval: 10